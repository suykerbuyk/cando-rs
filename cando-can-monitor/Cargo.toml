# Time handling
chrono.workspace = true

# Structured logging
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
tokio-test.workspace = true
tempfile.workspace = true

[lib]
name = "cando_can_monitor"
path = "src/lib.rs"
